name: Mirror to projects.blender.org

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BLENDER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan projects.blender.org >> ~/.ssh/known_hosts

      - name: Push mirror
        run: |
          git remote add blender git@projects.blender.org:alfa-haliza/3D-Asset-Manager.git
          git push --mirror blender
